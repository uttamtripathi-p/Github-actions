name: Setup and Greet
description: A composite action that greets a user

inputs:
  name:
    required: true
    description: "Name of the person to greet"
  language:
    default: "en"
    description: "Language of the greeting"

outputs:
  greeted:
    description: "Whether the greeting was done"
    value: ${{ steps.set-output.outputs.greeted }}

runs:
  using: composite
  steps:
    - name: Print greeting
      shell: bash
      run: |
        if [ "${{ inputs.language }}" == "en" ]; then
          echo "Hello, ${{ inputs.name }}!"
        elif [ "${{ inputs.language }}" == "hi" ]; then
          echo "Namaste, ${{ inputs.name }}!"
        else
          echo "Hey, ${{ inputs.name }}!"
        fi

    - name: Print date and OS
      shell: bash
      run: |
        echo "Current date: $(date)"
        echo "Runner OS: ${{ runner.os }}"

    - name: Set greeted output
      id: set-output
      shell: bash
      run: echo "greeted=true" >> $GITHUB_OUTPUT
