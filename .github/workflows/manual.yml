name: manual trigger

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Print selected environment
        run: echo "Deploying to ${{ github.event.inputs.environment }}"
