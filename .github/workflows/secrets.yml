name: secrets
on:
  push:
    branches: [main]

jobs:
  secret:
    runs-on: ubuntu-latest 
    steps:
      - name: This step tells if secret exists or not
        run: |
          echo "The secret is set: ${{ secrets.MY_SECRET_MESSAGE != '' }}"
      - name: passing secret in a environment variale
        env:
          MY_SECRET: ${{ secrets.MY_SECRET_MESSAGE }}
        run: |
          echo $MY_SECRET
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: file creation step
        run: |
          echo "The test report is successfull" >> main.test
          cat main.test

      - name: saving my test file
        uses: actions/upload-artifact@v4
        with:
          name: main-test
          path: main.test
