name: smart pipeline for lint
on: 
    push:
        branches: 

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: check out source repository
              uses: actions/checkout@v4
            - name: set up python environment
              uses: actions/setup-python@v5
                with:
                    python-version: 3.10
            - name: install linter dependencies
              run: |
                python -m pip install --upgrade pip
                pip install flake8
            - name: run linter
              run: |
                flake8 .
                echo "Linting completed successfully"

    test:
        runs-on: ubuntu-latest
        steps: 
            - name: This is a test step
              run: echo "running tests"
    summary:
        needs: [lint, test]
        runs-on: ubuntu-latest
        steps:
            - name: This is a summary step
              run: |
                echo "This push was made on branch ${{ github.ref }}"
                echo "The commit message was ${{ github.event.head_commit.message }}"
                