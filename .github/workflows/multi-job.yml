name: multi-job
on: workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: build
              run: echo "Building the app"
    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: test
              run: echo "Running tests"

deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
        - name: deploy
          run: echo "Deploying"